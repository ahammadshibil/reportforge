# Fly.io deploy config. ~$0-5/mo on shared-cpu-1x.
# After editing, run:  fly launch --copy-config --no-deploy   # first time
#                      fly secrets set ADMIN_EMAIL=... ADMIN_PASSWORD=... GEMINI_API_KEY=... SESSION_SECRET=$(openssl rand -hex 32)
#                      fly volumes create byor_data --size 1 --region <yours>
#                      fly deploy

app = "byor"            # change to your app name
primary_region = "bom"         # Mumbai — pick yours: bom/sin/sjc/iad/etc.

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  DATA_DIR = "/data"
  BRAND_NAME = "BYOR"
  BRAND_TAGLINE = "Build Your Own Report"
  BRAND_COLOR = "#0f766e"

[mounts]
  source = "byor_data"
  destination = "/data"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"     # idle savings — wakes on first request
  auto_start_machines = true
  min_machines_running = 0        # 0 = scale-to-zero; 1 to keep warm
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/brand"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"                # 256mb works but pdf-parse can OOM on large files
